{% if site.gitalk %}
<div style="text-align:right; margin-bottom: 8px; font-size: 0.85em;">
  <a href="https://github.com/TingdeLiu/Tingde.Liu.github.io/issues/new?title=[错误反馈] {{ page.title | uri_escape }}&labels=bug" target="_blank">📝 报告此页错误</a>
</div>
<div class="comments">
    <div id="gitalk-container"></div>
    <script>
        const gitalk = new Gitalk({
          clientID: "{{ site.gitalk.clientID }}",
          clientSecret: "{{ site.gitalk.clientSecret }}",
          repo: "{{ site.gitalk.repo }}",
          owner: "{{ site.gitalk.owner }}",
          admin: ["{{ site.gitalk.owner }}"],
          // id: window.location.pathname,      // Ensure uniqueness and length less than 50（如果这样设置的话标题太长会导致git talk出问题~）
          id: decodeURI('{{ page.url }}'),
          distractionFreeMode: false,  // Facebook-like distraction free mode
          title: "{{ page.title }}",
          language: "zh-CN",

        })
        
        gitalk.render('gitalk-container')
    </script>
</div>
{% endif %}
