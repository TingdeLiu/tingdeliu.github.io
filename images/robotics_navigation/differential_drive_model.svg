<svg xmlns="http://www.w3.org/2000/svg" width="580" height="400" viewBox="0 0 580 400">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="arrBlue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#1565c0"/>
    </marker>
    <marker id="arrRed" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#c62828"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrDim" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <polygon points="0 0,7 3.5,0 7" fill="#888"/>
    </marker>
    <marker id="arrDimL" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0,7 3.5,0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="580" height="400" fill="#f9f9fb" rx="8" stroke="#dde" stroke-width="1"/>

  <!-- Title -->
  <text x="290" y="26" text-anchor="middle"
        font-family="'Microsoft YaHei','PingFang SC',Arial,sans-serif"
        font-size="14" font-weight="bold" fill="#222">差分驱动运动学模型（俯视图）</text>

  <!-- World coordinate frame -->
  <line x1="50" y1="350" x2="90" y2="350" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="50" y1="350" x2="50" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="95" y="354" font-family="Arial,sans-serif" font-size="11" fill="#555">x</text>
  <text x="44" y="305" font-family="Arial,sans-serif" font-size="11" fill="#555">y</text>
  <text x="32" y="368" font-family="Arial,sans-serif" font-size="10" fill="#888">World</text>

  <!-- Robot body -->
  <rect x="195" y="155" width="190" height="130" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>

  <!-- Forward arrow (v) -->
  <line x1="290" y1="155" x2="290" y2="90" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="298" y="115" font-family="Arial,sans-serif" font-size="14" fill="#1565c0" font-style="italic">v</text>

  <!-- Robot heading label -->
  <text x="265" y="225" font-family="Arial,sans-serif" font-size="12" fill="#555">Robot</text>

  <!-- Left wheel -->
  <rect x="158" y="178" width="38" height="84" rx="6" fill="#37474f" stroke="#263238" stroke-width="1.5"/>

  <!-- Right wheel -->
  <rect x="384" y="178" width="38" height="84" rx="6" fill="#37474f" stroke="#263238" stroke-width="1.5"/>

  <!-- Caster wheel -->
  <circle cx="290" cy="297" r="13" fill="#90a4ae" stroke="#546e7a" stroke-width="1.5"/>
  <text x="310" y="302" font-family="Arial,sans-serif" font-size="10" fill="#546e7a">万向轮</text>

  <!-- Wheel axis dashed line -->
  <line x1="155" y1="220" x2="425" y2="220" stroke="#888" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ICR point -->
  <circle cx="290" cy="380" r="5" fill="#e53935"/>
  <text x="298" y="383" font-family="Arial,sans-serif" font-size="10" fill="#e53935">ICR（原地旋转时在轴心）</text>

  <!-- ωL arc arrow (left wheel) -->
  <path d="M 162,195 A 18,18 0 0,1 162,245" fill="none" stroke="#c62828" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="110" y="218" font-family="Arial,sans-serif" font-size="15" fill="#c62828" font-style="italic">ω</text>
  <text x="124" y="222" font-family="Arial,sans-serif" font-size="11" fill="#c62828">L</text>

  <!-- ωR arc arrow (right wheel) -->
  <path d="M 418,245 A 18,18 0 0,1 418,195" fill="none" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="432" y="218" font-family="Arial,sans-serif" font-size="15" fill="#2e7d32" font-style="italic">ω</text>
  <text x="446" y="222" font-family="Arial,sans-serif" font-size="11" fill="#2e7d32">R</text>

  <!-- r dimension on left wheel -->
  <line x1="158" y1="168" x2="196" y2="168" stroke="#888" stroke-width="1"
        marker-start="url(#arrDimL)" marker-end="url(#arrDim)"/>
  <text x="170" y="162" font-family="Arial,sans-serif" font-size="11" fill="#666" font-style="italic">r</text>

  <!-- 2b dimension line -->
  <line x1="178" y1="330" x2="402" y2="330" stroke="#888" stroke-width="1"
        marker-start="url(#arrDimL)" marker-end="url(#arrDim)"/>
  <text x="268" y="347" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#666" font-style="italic">2b</text>
  <!-- vertical ticks -->
  <line x1="178" y1="323" x2="178" y2="337" stroke="#888" stroke-width="1"/>
  <line x1="402" y1="323" x2="402" y2="337" stroke="#888" stroke-width="1"/>

  <!-- ω angular velocity label (robot) -->
  <path d="M 310,218 A 20,20 0 0,0 270,218" fill="none" stroke="#e65100" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="285" y="248" font-family="Arial,sans-serif" font-size="13" fill="#e65100" font-style="italic">ω</text>

  <!-- Formula box -->
  <rect x="30" y="55" width="150" height="55" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1.2"/>
  <text x="105" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="10.5" fill="#555">v = r(ω</text>
  <text x="140" y="77" font-family="Arial,sans-serif" font-size="8" fill="#555">R</text>
  <text x="148" y="73" font-family="Arial,sans-serif" font-size="10.5" fill="#555">+ω</text>
  <text x="167" y="77" font-family="Arial,sans-serif" font-size="8" fill="#555">L</text>
  <text x="175" y="73" font-family="Arial,sans-serif" font-size="10.5" fill="#555">) / 2</text>
  <text x="105" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="10.5" fill="#555">ω = r(ω</text>
  <text x="142" y="96" font-family="Arial,sans-serif" font-size="8" fill="#555">R</text>
  <text x="150" y="92" font-family="Arial,sans-serif" font-size="10.5" fill="#555">−ω</text>
  <text x="169" y="96" font-family="Arial,sans-serif" font-size="8" fill="#555">L</text>
  <text x="177" y="92" font-family="Arial,sans-serif" font-size="10.5" fill="#555">) / 2b</text>
</svg>
